<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stix Notes | Premium Markdown Workspace</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    },
                    colors: {
                        macos: {
                            bg: '#0F1115',
                            sidebar: 'rgba(20, 22, 28, 0.4)',
                            card: 'rgba(28, 31, 38, 0.7)',
                            border: 'rgba(255, 255, 255, 0.08)',
                            accent: '#5E6AD2'
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'scale-up': 'scaleUp 0.3s cubic-bezier(0.16, 1, 0.3, 1)',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        scaleUp: { '0%': { opacity: '0', transform: 'scale(0.95) translateY(10px)' }, '100%': { opacity: '1', transform: 'scale(1) translateY(0)' } }
                    }
                }
            }
        }
    </script>

    <style>
        :root { color-scheme: dark; }
        body {
            background-color: #0F1115;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(94, 106, 210, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(45, 212, 191, 0.1), transparent 25%);
            background-attachment: fixed;
            overflow: hidden;
            user-select: none;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }
        .glass-panel {
            background: rgba(28, 31, 38, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .prose {
            color: #E2E8F0;
            line-height: 1.6;
            user-select: text;
        }
        .prose h1 { font-size: 1.875rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #F8FAFC; }
        .prose h2 { font-size: 1.5rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #F8FAFC; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.3rem; }
        .prose h3 { font-size: 1.25rem; font-weight: 600; margin-top: 1.25rem; margin-bottom: 0.5rem; }
        .prose p { margin-bottom: 1rem; }
        .prose a { color: #818CF8; text-decoration: none; transition: color 0.2s; }
        .prose a:hover { color: #A5B4FC; text-decoration: underline; }
        .prose ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .prose ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1rem; }
        .prose li { margin-bottom: 0.25rem; }
        .prose blockquote { border-left: 4px solid #5E6AD2; padding-left: 1rem; color: #94A3B8; font-style: italic; background: rgba(94, 106, 210, 0.05); padding-top: 0.5rem; padding-bottom: 0.5rem; border-radius: 0 0.5rem 0.5rem 0; margin-bottom: 1rem;}
        .prose code { background: rgba(0,0,0,0.3); padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-family: 'Fira Code', monospace; font-size: 0.875em; color: #38BDF8; }
        .prose pre { background: rgba(0,0,0,0.4); padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 1rem; border: 1px solid rgba(255,255,255,0.05); }
        .prose pre code { background: transparent; padding: 0; color: #E2E8F0; }
        .prose table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
        .prose th, .prose td { border: 1px solid rgba(255,255,255,0.1); padding: 0.5rem; text-align: left; }
        .prose th { background: rgba(255,255,255,0.05); }
        .prose input[type="checkbox"] { margin-right: 0.5rem; accent-color: #5E6AD2; }
        .task-list-item { list-style-type: none; margin-left: -1.5rem; display: flex; align-items: flex-start; }
        @media (max-width: 768px) {
            .note-window {
                width: 100% !important; height: 100% !important;
                top: 0 !important; left: 0 !important;
                transform: none !important; border-radius: 0 !important;
                border-width: 0 !important; z-index: 1000 !important;
            }
            #sidebar { width: 100%; z-index: 50; }
            .canvas-area { display: none; }
            body.note-open #sidebar { display: none; }
            body.note-open .canvas-area { display: block; }
        }
        .resize-handle {
            position: absolute; bottom: 0; right: 0;
            width: 15px; height: 15px; cursor: se-resize;
        }
        .resize-handle::after {
            content: ''; position: absolute;
            right: 4px; bottom: 4px;
            width: 6px; height: 6px;
            border-right: 2px solid rgba(255,255,255,0.2);
            border-bottom: 2px solid rgba(255,255,255,0.2);
        }
        .auth-overlay {
            position: fixed; inset: 0; z-index: 99999;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
        }
        .auth-overlay.hidden { display: none; }
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-200 antialiased h-screen w-full flex overflow-hidden">

    <!-- Auth Container -->
    <div id="authContainer" class="auth-overlay">
        <div class="glass-panel rounded-2xl p-8 w-full max-w-md mx-4 animate-scale-up">
            <!-- Tabs -->
            <div class="flex mb-6 bg-black/20 rounded-lg p-1">
                <button id="loginTab" class="flex-1 py-2 text-sm font-medium rounded-md transition-all bg-indigo-500/20 text-indigo-300">Sign In</button>
                <button id="registerTab" class="flex-1 py-2 text-sm font-medium rounded-md transition-all text-slate-400 hover:text-white">Register</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="space-y-4">
                <div class="text-center mb-4">
                    <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center mx-auto mb-3 shadow-lg shadow-indigo-500/20">
                        <i data-lucide="pen-tool" class="w-6 h-6 text-white"></i>
                    </div>
                    <h2 class="text-xl font-bold text-white">Welcome Back</h2>
                    <p class="text-sm text-slate-400 mt-1">Sign in to your Stix Notes workspace</p>
                </div>
                <div>
                    <label class="text-xs text-slate-400 mb-1 block">Email</label>
                    <input type="email" name="email" required
                        class="w-full bg-black/20 border border-white/5 rounded-lg py-2.5 px-3 text-sm focus:outline-none focus:border-indigo-500/50 focus:ring-1 focus:ring-indigo-500/50 transition-all text-slate-200 placeholder:text-slate-600"
                        placeholder="you@example.com">
                </div>
                <div>
                    <label class="text-xs text-slate-400 mb-1 block">Password</label>
                    <input type="password" name="password" required
                        class="w-full bg-black/20 border border-white/5 rounded-lg py-2.5 px-3 text-sm focus:outline-none focus:border-indigo-500/50 focus:ring-1 focus:ring-indigo-500/50 transition-all text-slate-200 placeholder:text-slate-600"
                        placeholder="Enter your password">
                </div>
                <button type="submit"
                    class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white py-2.5 rounded-lg text-sm font-medium transition-all shadow-lg shadow-indigo-500/20 flex items-center justify-center gap-2">
                    <span id="loginBtnText">Sign In</span>
                    <i id="loginSpinner" data-lucide="loader-circle" class="w-4 h-4 spinner hidden"></i>
                </button>
                <p id="loginError" class="text-red-400 text-xs text-center hidden"></p>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="space-y-4 hidden">
                <div class="text-center mb-4">
                    <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center mx-auto mb-3 shadow-lg shadow-indigo-500/20">
                        <i data-lucide="pen-tool" class="w-6 h-6 text-white"></i>
                    </div>
                    <h2 class="text-xl font-bold text-white">Create Account</h2>
                    <p class="text-sm text-slate-400 mt-1">Start your markdown workspace</p>
                </div>
                <div>
                    <label class="text-xs text-slate-400 mb-1 block">Name</label>
                    <input type="text" name="name" required
                        class="w-full bg-black/20 border border-white/5 rounded-lg py-2.5 px-3 text-sm focus:outline-none focus:border-indigo-500/50 focus:ring-1 focus:ring-indigo-500/50 transition-all text-slate-200 placeholder:text-slate-600"
                        placeholder="Your name">
                </div>
                <div>
                    <label class="text-xs text-slate-400 mb-1 block">Email</label>
                    <input type="email" name="email" required
                        class="w-full bg-black/20 border border-white/5 rounded-lg py-2.5 px-3 text-sm focus:outline-none focus:border-indigo-500/50 focus:ring-1 focus:ring-indigo-500/50 transition-all text-slate-200 placeholder:text-slate-600"
                        placeholder="you@example.com">
                </div>
                <div>
                    <label class="text-xs text-slate-400 mb-1 block">Password</label>
                    <input type="password" name="password" required minlength="6"
                        class="w-full bg-black/20 border border-white/5 rounded-lg py-2.5 px-3 text-sm focus:outline-none focus:border-indigo-500/50 focus:ring-1 focus:ring-indigo-500/50 transition-all text-slate-200 placeholder:text-slate-600"
                        placeholder="Min 6 characters">
                </div>
                <button type="submit"
                    class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white py-2.5 rounded-lg text-sm font-medium transition-all shadow-lg shadow-indigo-500/20 flex items-center justify-center gap-2">
                    <span id="registerBtnText">Create Account</span>
                    <i id="registerSpinner" data-lucide="loader-circle" class="w-4 h-4 spinner hidden"></i>
                </button>
                <p id="registerError" class="text-red-400 text-xs text-center hidden"></p>
            </form>

            <p class="text-xs text-slate-500 text-center mt-4">
                Demo: <strong class="text-slate-400">demo@stixnotes.app</strong> / <strong class="text-slate-400">demo1234</strong>
            </p>
        </div>
    </div>

    <!-- User Menu (shown when authenticated) -->
    <div id="userMenu" class="hidden fixed top-4 right-4 z-50 flex items-center gap-3">
        <span id="userNameDisplay" class="text-xs text-slate-400"></span>
        <button onclick="stix.logout()" class="text-xs px-3 py-1.5 rounded-lg bg-white/5 hover:bg-white/10 text-slate-400 hover:text-white border border-white/5 transition-all flex items-center gap-1.5">
            <i data-lucide="log-out" class="w-3 h-3"></i> Logout
        </button>
    </div>

    <aside id="sidebar" class="w-80 h-full macos-sidebar backdrop-blur-xl border-r border-macos-border flex flex-col z-40 transition-all duration-300 bg-[#0F1115]/60">
        <div class="p-5 border-b border-macos-border">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                        <i data-lucide="pen-tool" class="w-4 h-4 text-white"></i>
                    </div>
                    <h1 class="text-lg font-bold tracking-tight text-white">Stix Notes</h1>
                </div>
                <button onclick="stix.createNote()" class="p-2 rounded-md hover:bg-white/10 transition-colors tooltip-trigger" title="New Note (Ctrl+N)">
                    <i data-lucide="plus" class="w-5 h-5 text-slate-300"></i>
                </button>
            </div>
            <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
                <input type="text" id="searchInput" placeholder="Search notes..." 
                    class="w-full bg-black/20 border border-white/5 rounded-lg py-2 pl-9 pr-3 text-sm focus:outline-none focus:border-indigo-500/50 focus:ring-1 focus:ring-indigo-500/50 transition-all placeholder:text-slate-600 text-slate-200">
            </div>
        </div>

        <div id="notesList" class="flex-1 overflow-y-auto p-3 space-y-1 custom-scrollbar">
            <div class="text-center p-4 text-slate-500 text-sm" id="loadingNotes">
                <i data-lucide="loader-circle" class="w-4 h-4 inline-block spinner"></i> Loading notes...
            </div>
        </div>

        <div class="p-3 border-t border-macos-border text-xs text-slate-500 flex justify-between items-center bg-black/10">
            <span id="noteCount">0 Notes</span>
            <span class="flex items-center gap-1"><i data-lucide="cloud-lightning" class="w-3 h-3 text-emerald-400"></i> Cloud sync</span>
        </div>
    </aside>

    <main class="flex-1 relative overflow-hidden canvas-area" id="canvas">
        <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center text-slate-600 opacity-50 pointer-events-none transition-opacity duration-300">
            <i data-lucide="layers" class="w-24 h-24 mb-4 opacity-20"></i>
            <h2 class="text-xl font-medium text-slate-400">Workspace is empty</h2>
            <p class="text-sm mt-2">Press <kbd class="px-2 py-1 bg-black/30 rounded border border-white/10 mx-1">Ctrl + N</kbd> to create a note</p>
        </div>
        <div id="windowsContainer" class="absolute inset-0 pointer-events-none"></div>
    </main>

    <div id="toastContainer" class="fixed bottom-5 right-5 z-[9999] flex flex-col gap-2"></div>

    <script>
        // =========================================================================
        // API CONFIGURATION
        // =========================================================================
        var API = {
            baseUrl: 'https://script.google.com/macros/s/AKfycbx9ILJwWGF365DQnwRHJ0WgneyFNjHIOu6YeEoFvHRzsN97zXWy11spyefJYcz5puNw/exec',  // Set this to your GAS deployment URL
            getUrl: function(endpoint) {
                var params = [];
                for (var i = 1; i < arguments.length; i++) {
                    if (typeof arguments[i] === 'object') {
                        Object.keys(arguments[i]).forEach(function(k) {
                            params.push('_token=' + encodeURIComponent(arguments[i][k]));
                        });
                    }
                }
                var sep = endpoint.indexOf('?') === -1 ? '?' : '&';
                return this.baseUrl + sep + 'route=' + encodeURIComponent(endpoint);
            },
            token: localStorage.getItem('stix_token') || null
        };

        // =========================================================================
        // API SERVICE LAYER
        // =========================================================================
        var ApiService = {
            request: function(method, endpoint, data, params) {
                var url = API.getUrl(endpoint);
                var options = {
                    method: method
                };
                if (data) {
                    options.contentType = 'application/json';
                    options.payload = JSON.stringify(data);
                }
                if (API.token) {
                    url += (endpoint.indexOf('?') === -1 ? '?' : '&') + '_token=' + encodeURIComponent(API.token);
                }
                url += '&_method=' + method;

                return new Promise(function(resolve, reject) {
                    try {
                        var xhr = new XMLHttpRequest();
                        xhr.open(method, url, true);
                        xhr.setRequestHeader('Content-Type', 'application/json');
                        if (API.token) {
                            xhr.setRequestHeader('Authorization', 'Bearer ' + API.token);
                        }
                        xhr.onreadystatechange = function() {
                            if (xhr.readyState === 4) {
                                try {
                                    var body = JSON.parse(xhr.responseText);
                                    if (xhr.status >= 200 && xhr.status < 300 && body.success) {
                                        resolve(body);
                                    } else if (!body.success) {
                                        reject({ message: body.error || 'Request failed', status: xhr.status, body: body });
                                    } else {
                                        resolve(body);
                                    }
                                } catch (e) {
                                    reject({ message: 'Invalid server response', status: xhr.status });
                                }
                            }
                        };
                        xhr.onerror = function() {
                            reject({ message: 'Network error. Check your connection.' });
                        };
                        xhr.send(data ? JSON.stringify(data) : null);
                    } catch (e) {
                        reject({ message: 'Failed to send request: ' + e.message });
                    }
                });
            },

            get: function(endpoint, params) {
                return this.request('GET', endpoint, null, params);
            },
            post: function(endpoint, data) {
                return this.request('POST', endpoint, data);
            },
            put: function(endpoint, data) {
                return this.request('PUT', endpoint, data);
            },
            del: function(endpoint) {
                return this.request('DELETE', endpoint);
            },

            // --- Auth ---
            login: function(email, password) {
                return this.post('/api/auth/login', { email: email, password: password });
            },
            register: function(name, email, password) {
                return this.post('/api/auth/register', { name: name, email: email, password: password });
            },
            logout: function() {
                return this.post('/api/auth/logout', {});
            },
            getMe: function() {
                return this.get('/api/auth/me');
            },

            // --- Notes ---
            getNotes: function(params) {
                return this.get('/api/notes', params);
            },
            getNote: function(id) {
                return this.get('/api/notes/' + id);
            },
            createNote: function(data) {
                return this.post('/api/notes', data);
            },
            updateNote: function(id, data) {
                return this.put('/api/notes/' + id, data);
            },
            deleteNote: function(id) {
                return this.del('/api/notes/' + id);
            },
            restoreNote: function(id) {
                return this.put('/api/notes/' + id + '/restore', {});
            },

            // --- Settings ---
            getSettings: function() {
                return this.get('/api/settings');
            },
            updateSettings: function(data) {
                return this.put('/api/settings', data);
            },

            // --- Stats ---
            getStats: function() {
                return this.get('/api/stats');
            }
        };

        // =========================================================================
        // STIX NOTES — Core Application Object (API-connected)
        // =========================================================================
        var stix = (function() {
            var notes = [];
            var activeZIndex = 100;
            var currentSearch = '';
            var currentUser = null;
            var isLoadingNotes = false;

            var DOM = {
                notesList: document.getElementById('notesList'),
                searchInput: document.getElementById('searchInput'),
                noteCount: document.getElementById('noteCount'),
                windowsContainer: document.getElementById('windowsContainer'),
                emptyState: document.getElementById('emptyState'),
                toastContainer: document.getElementById('toastContainer'),
                authContainer: document.getElementById('authContainer'),
                userMenu: document.getElementById('userMenu'),
                userNameDisplay: document.getElementById('userNameDisplay'),
                loginForm: document.getElementById('loginForm'),
                registerForm: document.getElementById('registerForm'),
                loginTab: document.getElementById('loginTab'),
                registerTab: document.getElementById('registerTab'),
                loginError: document.getElementById('loginError'),
                registerError: document.getElementById('registerError'),
                loginBtnText: document.getElementById('loginBtnText'),
                loginSpinner: document.getElementById('loginSpinner'),
                registerBtnText: document.getElementById('registerBtnText'),
                registerSpinner: document.getElementById('registerSpinner'),
                loadingNotes: document.getElementById('loadingNotes')
            };

            // ============================================================
            // INITIALIZATION
            // ============================================================
            function init() {
                marked.setOptions({ breaks: true, gfm: true });

                // Check for existing token
                var savedToken = localStorage.getItem('stix_token');
                if (savedToken) {
                    API.token = savedToken;
                    validateTokenAndBoot();
                } else {
                    showAuth();
                }

                setupEventListeners();
                setupShortcuts();
                setupAuthListeners();
            }

            function validateTokenAndBoot() {
                ApiService.getMe()
                    .then(function(res) {
                        currentUser = res.data;
                        API.token = localStorage.getItem('stix_token');
                        hideAuth();
                        bootApp();
                    })
                    .catch(function() {
                        localStorage.removeItem('stix_token');
                        API.token = null;
                        showAuth();
                    });
            }

            function bootApp() {
                DOM.userMenu.classList.remove('hidden');
                DOM.userNameDisplay.textContent = currentUser.name || currentUser.email;
                lucide.createIcons({ root: DOM.userMenu });
                loadNotes();
                setupEventListeners();
                setupShortcuts();
            }

            // ============================================================
            // AUTH
            // ============================================================
            function showAuth() {
                DOM.authContainer.classList.remove('hidden');
                DOM.userMenu.classList.add('hidden');
                DOM.notesList.innerHTML = '';
                DOM.windowsContainer.innerHTML = '';
            }

            function hideAuth() {
                DOM.authContainer.classList.add('hidden');
            }

            function showLoginForm() {
                DOM.loginForm.classList.remove('hidden');
                DOM.registerForm.classList.add('hidden');
                DOM.loginTab.className = 'flex-1 py-2 text-sm font-medium rounded-md transition-all bg-indigo-500/20 text-indigo-300';
                DOM.registerTab.className = 'flex-1 py-2 text-sm font-medium rounded-md transition-all text-slate-400 hover:text-white';
                DOM.loginError.classList.add('hidden');
                DOM.registerError.classList.add('hidden');
            }

            function showRegisterForm() {
                DOM.loginForm.classList.add('hidden');
                DOM.registerForm.classList.remove('hidden');
                DOM.loginTab.className = 'flex-1 py-2 text-sm font-medium rounded-md transition-all text-slate-400 hover:text-white';
                DOM.registerTab.className = 'flex-1 py-2 text-sm font-medium rounded-md transition-all bg-indigo-500/20 text-indigo-300';
                DOM.loginError.classList.add('hidden');
                DOM.registerError.classList.add('hidden');
            }

            function handleLogin(e) {
                e.preventDefault();
                var email = e.target.email.value.trim();
                var password = e.target.password.value;

                DOM.loginError.classList.add('hidden');
                DOM.loginBtnText.textContent = 'Signing in...';
                DOM.loginSpinner.classList.remove('hidden');

                ApiService.login(email, password)
                    .then(function(res) {
                        API.token = res.data.token;
                        currentUser = res.data.user;
                        localStorage.setItem('stix_token', API.token);
                        hideAuth();
                        bootApp();
                        showToast('Welcome back, ' + currentUser.name + '!');
                    })
                    .catch(function(err) {
                        DOM.loginError.textContent = err.message || 'Login failed. Check your credentials.';
                        DOM.loginError.classList.remove('hidden');
                    })
                    .finally(function() {
                        DOM.loginBtnText.textContent = 'Sign In';
                        DOM.loginSpinner.classList.add('hidden');
                    });
            }

            function handleRegister(e) {
                e.preventDefault();
                var name = e.target.name.value.trim();
                var email = e.target.email.value.trim();
                var password = e.target.password.value;

                DOM.registerError.classList.add('hidden');
                DOM.registerBtnText.textContent = 'Creating account...';
                DOM.registerSpinner.classList.remove('hidden');

                ApiService.register(name, email, password)
                    .then(function(res) {
                        API.token = res.data.token;
                        currentUser = res.data.user;
                        localStorage.setItem('stix_token', API.token);
                        hideAuth();
                        bootApp();
                        showToast('Welcome to Stix Notes, ' + currentUser.name + '!');
                    })
                    .catch(function(err) {
                        DOM.registerError.textContent = err.message || 'Registration failed.';
                        DOM.registerError.classList.remove('hidden');
                    })
                    .finally(function() {
                        DOM.registerBtnText.textContent = 'Create Account';
                        DOM.registerSpinner.classList.add('hidden');
                    });
            }

            function logout() {
                ApiService.logout()
                    .catch(function() {})
                    .finally(function() {
                        API.token = null;
                        currentUser = null;
                        notes = [];
                        localStorage.removeItem('stix_token');
                        DOM.windowsContainer.innerHTML = '';
                        showAuth();
                        showToast('Logged out');
                    });
            }

            // ============================================================
            // DATA LAYER (API)
            // ============================================================
            function loadNotes() {
                if (isLoadingNotes) return;
                isLoadingNotes = true;

                DOM.loadingNotes.style.display = 'block';
                DOM.notesList.innerHTML = '';
                DOM.notesList.appendChild(DOM.loadingNotes);

                var params = {};
                if (currentSearch) params.search = currentSearch;

                ApiService.getNotes(params)
                    .then(function(res) {
                        notes = res.data.map(function(n) {
                            return {
                                id: n.id,
                                title: n.title || '',
                                content: n.content || '',
                                x: n.x,
                                y: n.y,
                                w: n.w,
                                h: n.h,
                                isOpen: n.isOpen,
                                zIndex: n.zIndex,
                                lastEdited: n.lastEdited ? new Date(n.lastEdited).getTime() : Date.now()
                            };
                        });
                        activeZIndex = notes.reduce(function(max, n) { return Math.max(max, n.zIndex || 0); }, 100) + 1;
                        renderSidebar();
                        renderOpenWindows();
                        checkEmptyState();
                    })
                    .catch(function(err) {
                        showToast('Failed to load notes: ' + (err.message || 'Connection error'));
                    })
                    .finally(function() {
                        isLoadingNotes = false;
                    });
            }

            function createNote() {
                var isMobile = window.innerWidth <= 768;
                var offset = (notes.length % 5) * 20;
                var width = isMobile ? window.innerWidth : 600;
                var height = isMobile ? window.innerHeight : 450;
                var canvasWidth = window.innerWidth - 320;
                var x = isMobile ? 0 : Math.max(0, (canvasWidth - width) / 2) + 320 + offset;
                var y = isMobile ? 0 : Math.max(0, (window.innerHeight - height) / 2) + offset;

                var noteData = {
                    title: '',
                    content: '',
                    x: x,
                    y: y,
                    w: width,
                    h: height,
                    isOpen: true,
                    zIndex: ++activeZIndex
                };

                ApiService.createNote(noteData)
                    .then(function(res) {
                        var note = res.data;
                        var newNote = {
                            id: note.id,
                            title: note.title || '',
                            content: note.content || '',
                            x: note.x,
                            y: note.y,
                            w: note.w,
                            h: note.h,
                            isOpen: true,
                            zIndex: note.zIndex,
                            lastEdited: Date.now()
                        };
                        notes.unshift(newNote);
                        if (isMobile) document.body.classList.add('note-open');
                        createWindowElement(newNote);
                        renderSidebar();
                        checkEmptyState();
                        showToast('New note created');
                    })
                    .catch(function(err) {
                        showToast('Failed to create note: ' + (err.message || 'Error'));
                    });
            }

            function updateNote(id, updates) {
                var note = notes.find(function(n) { return n.id === id; });
                if (!note) return;

                Object.assign(note, updates);
                note.lastEdited = Date.now();

                ApiService.updateNote(id, updates)
                    .catch(function(err) {
                        showToast('Auto-save failed: ' + (err.message || 'Connection error'));
                    });
            }

            function deleteNote(id) {
                ApiService.deleteNote(id)
                    .then(function() {
                        notes = notes.filter(function(n) { return n.id !== id; });
                        var win = document.getElementById('window_' + id);
                        if (win) win.remove();
                        if (window.innerWidth <= 768 && !notes.some(function(n) { return n.isOpen; })) {
                            document.body.classList.remove('note-open');
                        }
                        renderSidebar();
                        checkEmptyState();
                        showToast('Note deleted');
                    })
                    .catch(function(err) {
                        showToast('Failed to delete note: ' + (err.message || 'Error'));
                    });
            }

            function toggleWindowStatus(id, forceStatus) {
                var note = notes.find(function(n) { return n.id === id; });
                if (!note) return;

                note.isOpen = forceStatus !== null && forceStatus !== undefined ? forceStatus : !note.isOpen;
                note.zIndex = ++activeZIndex;
                note.lastEdited = Date.now();

                ApiService.updateNote(id, { isOpen: note.isOpen, zIndex: note.zIndex })
                    .catch(function() {});

                var existingWin = document.getElementById('window_' + id);

                if (note.isOpen) {
                    if (window.innerWidth <= 768) document.body.classList.add('note-open');
                    if (existingWin) {
                        bringToFront(id);
                    } else {
                        createWindowElement(note);
                    }
                } else {
                    if (existingWin) {
                        existingWin.classList.add('scale-95', 'opacity-0');
                        setTimeout(function() { existingWin.remove(); }, 200);
                    }
                    if (window.innerWidth <= 768) document.body.classList.remove('note-open');
                }
                renderSidebar();
                checkEmptyState();
            }

            // ============================================================
            // RENDER FUNCTIONS
            // ============================================================
            function renderSidebar() {
                DOM.notesList.innerHTML = '';

                var filteredNotes = notes
                    .filter(function(n) {
                        return (n.title || 'Untitled Note').toLowerCase().indexOf(currentSearch.toLowerCase()) !== -1 ||
                               n.content.toLowerCase().indexOf(currentSearch.toLowerCase()) !== -1;
                    })
                    .sort(function(a, b) { return b.lastEdited - a.lastEdited; });

                DOM.noteCount.textContent = notes.length + ' Notes';

                if (filteredNotes.length === 0) {
                    DOM.notesList.innerHTML = '<div class="text-center p-4 text-slate-500 text-sm">No notes found.</div>';
                    return;
                }

                filteredNotes.forEach(function(note) {
                    var title = note.title.trim() || 'Untitled Note';
                    var preview = note.content.replace(/[#*_>~`]/g, '').trim().substring(0, 40) || 'No additional text...';
                    var time = formatTime(note.lastEdited);
                    var isActive = note.isOpen ? 'bg-indigo-500/10 border-indigo-500/30' : 'border-transparent hover:bg-white/5';

                    var el = document.createElement('div');
                    el.className = 'p-3 rounded-lg cursor-pointer border transition-colors duration-200 mb-1 ' + isActive;
                    el.onclick = function() { toggleWindowStatus(note.id, true); };
                    el.innerHTML =
                        '<div class="flex justify-between items-start mb-1">' +
                            '<h3 class="font-medium text-sm text-slate-200 truncate pr-2">' + escapeHTML(title) + '</h3>' +
                            '<span class="text-[10px] text-slate-500 whitespace-nowrap">' + time + '</span>' +
                        '</div>' +
                        '<p class="text-xs text-slate-400 truncate">' + escapeHTML(preview) + '</p>';
                    DOM.notesList.appendChild(el);
                });
            }

            function renderOpenWindows() {
                DOM.windowsContainer.innerHTML = '';
                notes.filter(function(n) { return n.isOpen; }).forEach(function(note) {
                    createWindowElement(note);
                });
            }

            function createWindowElement(note) {
                if (document.getElementById('window_' + note.id)) return;

                var win = document.createElement('div');
                win.id = 'window_' + note.id;
                win.className = 'note-window absolute glass-panel rounded-xl flex flex-col pointer-events-auto animate-scale-up';
                win.style.width = note.w + 'px';
                win.style.height = note.h + 'px';
                win.style.transform = 'translate(' + note.x + 'px, ' + note.y + 'px)';
                win.style.zIndex = note.zIndex;
                win.dataset.x = note.x;
                win.dataset.y = note.y;

                win.addEventListener('mousedown', function() { bringToFront(note.id); });
                win.addEventListener('touchstart', function() { bringToFront(note.id); }, { passive: true });

                win.innerHTML =
                    '<div class="drag-handle h-12 border-b border-macos-border flex items-center px-4 cursor-move bg-white/[0.02] shrink-0 rounded-t-xl group">' +
                        '<div class="flex gap-2 mr-4 z-10">' +
                            '<button onclick="stix.toggleWindowStatus(\'' + note.id + '\', false)" class="w-3 h-3 rounded-full bg-red-500/80 hover:bg-red-400 border border-red-600/50 flex items-center justify-center transition-colors">' +
                                '<i data-lucide="x" class="w-2 h-2 text-red-900 opacity-0 group-hover:opacity-100"></i>' +
                            '</button>' +
                            '<button onclick="stix.toggleFullScreen(\'' + note.id + '\')" class="w-3 h-3 rounded-full bg-emerald-500/80 hover:bg-emerald-400 border border-emerald-600/50 flex items-center justify-center transition-colors md:flex hidden">' +
                                '<i data-lucide="maximize-2" class="w-2 h-2 text-emerald-900 opacity-0 group-hover:opacity-100"></i>' +
                            '</button>' +
                        '</div>' +
                        '<input type="text" class="title-input flex-1 bg-transparent border-none outline-none text-sm font-medium text-slate-300 text-center mr-8" placeholder="Untitled Note" value="' + escapeHTML(note.title) + '">' +
                    '</div>' +
                    '<div class="flex items-center gap-1 p-2 border-b border-macos-border bg-black/20 shrink-0 overflow-x-auto no-scrollbar">' +
                        generateToolbarButtons() +
                        '<div class="flex-1"></div>' +
                        '<button class="toggle-preview-btn p-1.5 rounded hover:bg-white/10 text-slate-400 hover:text-indigo-400 transition-colors tooltip-trigger" title="Toggle Edit/Preview">' +
                            '<i data-lucide="eye" class="w-4 h-4"></i>' +
                        '</button>' +
                        '<button onclick="stix.deleteNote(\'' + note.id + '\')" class="p-1.5 rounded hover:bg-red-500/20 text-slate-400 hover:text-red-400 transition-colors tooltip-trigger" title="Delete Note">' +
                            '<i data-lucide="trash-2" class="w-4 h-4"></i>' +
                        '</button>' +
                    '</div>' +
                    '<div class="flex-1 relative overflow-hidden flex flex-col sm:flex-row bg-[#0F1115]/50 rounded-b-xl">' +
                        '<textarea class="editor-pane flex-1 w-full h-full p-5 bg-transparent border-none outline-none resize-none text-slate-300 font-mono text-sm leading-relaxed custom-scrollbar placeholder-slate-600" placeholder="Start typing in Markdown...">' + escapeHTML(note.content) + '</textarea>' +
                        '<div class="w-[1px] bg-macos-border hidden sm:block preview-divider"></div>' +
                        '<div class="preview-pane flex-1 w-full h-full p-5 overflow-y-auto custom-scrollbar prose hidden sm:block bg-black/10"></div>' +
                    '</div>' +
                    '<div class="resize-handle md:block hidden"></div>';

                DOM.windowsContainer.appendChild(win);
                lucide.createIcons({ root: win });
                setupWindowLogic(win, note);
                if (window.innerWidth > 768) {
                    setupInteractJS(win, note.id);
                }
            }

            function setupWindowLogic(win, note) {
                var titleInput = win.querySelector('.title-input');
                var textarea = win.querySelector('.editor-pane');
                var preview = win.querySelector('.preview-pane');
                var toggleBtn = win.querySelector('.toggle-preview-btn');
                var isPreviewMode = false;

                var updatePreview = function() {
                    var rawHtml = marked.parse(textarea.value);
                    var cleanHtml = DOMPurify.sanitize(rawHtml);
                    var styledHtml = cleanHtml
                        .replace(/<li><input disabled="" type="checkbox">/g, '<li class="task-list-item"><input disabled="" type="checkbox">')
                        .replace(/<li><input checked="" disabled="" type="checkbox">/g, '<li class="task-list-item"><input checked="" disabled="" type="checkbox">');
                    preview.innerHTML = styledHtml;
                };

                updatePreview();

                var titleTimeout, contentTimeout;

                titleInput.addEventListener('input', function() {
                    clearTimeout(titleTimeout);
                    titleTimeout = setTimeout(function() {
                        updateNote(note.id, { title: titleInput.value });
                    }, 300);
                });

                textarea.addEventListener('input', function() {
                    updatePreview();
                    clearTimeout(contentTimeout);
                    contentTimeout = setTimeout(function() {
                        updateNote(note.id, { content: textarea.value });
                    }, 300);
                });

                textarea.addEventListener('keydown', function(e) {
                    if (e.key === 'Tab') {
                        e.preventDefault();
                        var start = this.selectionStart;
                        var end = this.selectionEnd;
                        this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
                        this.selectionStart = this.selectionEnd = start + 4;
                        updatePreview();
                        updateNote(note.id, { content: this.value });
                    }
                });

                toggleBtn.addEventListener('click', function() {
                    isPreviewMode = !isPreviewMode;
                    if (isPreviewMode) {
                        textarea.classList.add('hidden');
                        preview.classList.remove('hidden');
                        preview.classList.remove('sm:block');
                        toggleBtn.innerHTML = '<i data-lucide="edit-3" class="w-4 h-4"></i>';
                    } else {
                        textarea.classList.remove('hidden');
                        preview.classList.add('hidden');
                        preview.classList.add('sm:block');
                        toggleBtn.innerHTML = '<i data-lucide="eye" class="w-4 h-4"></i>';
                    }
                    lucide.createIcons({ root: toggleBtn });
                });

                var tBtns = win.querySelectorAll('.md-btn');
                tBtns.forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        var prefix = btn.dataset.prefix;
                        var suffix = btn.dataset.suffix || '';
                        insertMarkdown(textarea, prefix, suffix);
                        updatePreview();
                        updateNote(note.id, { content: textarea.value });
                    });
                });
            }

            function setupInteractJS(element, id) {
                interact(element)
                    .draggable({
                        allowFrom: '.drag-handle',
                        ignoreFrom: '.title-input, button',
                        modifiers: [
                            interact.modifiers.restrictRect({
                                restriction: '#canvas',
                                endOnly: false
                            })
                        ],
                        listeners: {
                            move: function(event) {
                                var target = event.target;
                                var x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                                var y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
                                target.style.transform = 'translate(' + x + 'px, ' + y + 'px)';
                                target.setAttribute('data-x', x);
                                target.setAttribute('data-y', y);
                            },
                            end: function(event) {
                                var x = parseFloat(event.target.getAttribute('data-x'));
                                var y = parseFloat(event.target.getAttribute('data-y'));
                                updateNote(id, { x: x, y: y });
                            }
                        }
                    })
                    .resizable({
                        edges: { left: false, right: '.resize-handle', bottom: '.resize-handle', top: false },
                        modifiers: [
                            interact.modifiers.restrictSize({ min: { width: 300, height: 200 } }),
                            interact.modifiers.restrictRect({ restriction: '#canvas' })
                        ],
                        listeners: {
                            move: function(event) {
                                var x = (parseFloat(event.target.dataset.x) || 0) + event.deltaRect.left;
                                var y = (parseFloat(event.target.dataset.y) || 0) + event.deltaRect.top;
                                event.target.style.width = event.rect.width + 'px';
                                event.target.style.height = event.rect.height + 'px';
                                event.target.style.transform = 'translate(' + x + 'px, ' + y + 'px)';
                                event.target.dataset.x = x;
                                event.target.dataset.y = y;
                            },
                            end: function(event) {
                                updateNote(id, {
                                    w: parseFloat(event.target.style.width),
                                    h: parseFloat(event.target.style.height)
                                });
                            }
                        }
                    });
            }

            function bringToFront(id) {
                var note = notes.find(function(n) { return n.id === id; });
                var win = document.getElementById('window_' + id);
                if (note && win && note.zIndex !== activeZIndex) {
                    activeZIndex++;
                    note.zIndex = activeZIndex;
                    win.style.zIndex = activeZIndex;
                }
            }

            function toggleFullScreen(id) {
                var win = document.getElementById('window_' + id);
                if (!win) return;
                var isMax = win.dataset.maximized === 'true';
                if (isMax) {
                    var n = notes.find(function(n) { return n.id === id; });
                    win.style.width = n.w + 'px';
                    win.style.height = n.h + 'px';
                    win.style.transform = 'translate(' + n.x + 'px, ' + n.y + 'px)';
                    win.style.borderRadius = '';
                    win.dataset.maximized = 'false';
                    interact(win).draggable(true).resizable(true);
                } else {
                    win.style.width = '100%';
                    win.style.height = '100%';
                    win.style.transform = 'translate(0px, 0px)';
                    win.style.borderRadius = '0';
                    win.dataset.maximized = 'true';
                    interact(win).draggable(false).resizable(false);
                }
            }

            function insertMarkdown(textarea, prefix, suffix) {
                var start = textarea.selectionStart;
                var end = textarea.selectionEnd;
                var text = textarea.value;
                var selection = text.substring(start, end);
                var replace = prefix + selection + suffix;
                textarea.value = text.substring(0, start) + replace + text.substring(end);
                textarea.focus();
                textarea.selectionStart = start + prefix.length;
                textarea.selectionEnd = end + prefix.length + selection.length;
            }

            function generateToolbarButtons() {
                var tools = [
                    { icon: 'bold', prefix: '**', suffix: '**', title: 'Bold' },
                    { icon: 'italic', prefix: '_', suffix: '_', title: 'Italic' },
                    { icon: 'heading-1', prefix: '# ', suffix: '', title: 'Heading 1' },
                    { icon: 'heading-2', prefix: '## ', suffix: '', title: 'Heading 2' },
                    { icon: 'quote', prefix: '> ', suffix: '', title: 'Quote' },
                    { icon: 'code', prefix: '`', suffix: '`', title: 'Inline Code' },
                    { icon: 'square-code', prefix: '\n```\n', suffix: '\n```\n', title: 'Code Block' },
                    { icon: 'list', prefix: '- ', suffix: '', title: 'Bullet List' },
                    { icon: 'check-square', prefix: '- [ ] ', suffix: '', title: 'Task List' },
                ];
                return tools.map(function(t) {
                    return '<button class="md-btn p-1.5 rounded hover:bg-white/10 text-slate-400 hover:text-white transition-colors tooltip-trigger" title="' + t.title + '" data-prefix="' + t.prefix + '" data-suffix="' + t.suffix + '"><i data-lucide="' + t.icon + '" class="w-4 h-4"></i></button>';
                }).join('');
            }

            function checkEmptyState() {
                var hasOpenNotes = notes.some(function(n) { return n.isOpen; });
                DOM.emptyState.style.opacity = hasOpenNotes ? '0' : '1';
                DOM.windowsContainer.style.pointerEvents = hasOpenNotes ? 'auto' : 'none';
            }

            function showToast(message) {
                var toast = document.createElement('div');
                toast.className = 'bg-white/10 backdrop-blur-md border border-white/20 text-white px-4 py-2 rounded-lg shadow-lg text-sm animate-scale-up';
                toast.innerHTML = '<div class="flex items-center gap-2"><i data-lucide="check-circle" class="w-4 h-4 text-emerald-400"></i> ' + message + '</div>';
                DOM.toastContainer.appendChild(toast);
                lucide.createIcons({ root: toast });
                setTimeout(function() {
                    toast.classList.add('opacity-0', 'transition-opacity', 'duration-300');
                    setTimeout(function() { toast.remove(); }, 300);
                }, 2000);
            }

            function formatTime(timestamp) {
                if (!timestamp) return '';
                var date = new Date(timestamp);
                var now = new Date();
                var diff = now - date;
                if (diff < 60000) return 'Just now';
                if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
                if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
                return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            }

            function escapeHTML(str) {
                return String(str).replace(/[&<>'"]/g, function(tag) {
                    return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' })[tag] || tag;
                });
            }

            // ============================================================
            // EVENT LISTENERS
            // ============================================================
            function setupEventListeners() {
                DOM.searchInput.addEventListener('input', function(e) {
                    currentSearch = e.target.value;
                    renderSidebar();
                });

                window.addEventListener('resize', function() {
                    if (window.innerWidth <= 768) {
                        var hasOpen = notes.some(function(n) { return n.isOpen; });
                        if (hasOpen) document.body.classList.add('note-open');
                    } else {
                        document.body.classList.remove('note-open');
                    }
                });
            }

            function setupAuthListeners() {
                DOM.loginTab.addEventListener('click', showLoginForm);
                DOM.registerTab.addEventListener('click', showRegisterForm);
                DOM.loginForm.addEventListener('submit', handleLogin);
                DOM.registerForm.addEventListener('submit', handleRegister);
            }

            function setupShortcuts() {
                document.addEventListener('keydown', function(e) {
                    if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
                        e.preventDefault();
                        createNote();
                    }
                    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                        e.preventDefault();
                        showToast('Progress saved securely');
                    }
                    if (e.key === 'Escape') {
                        var openNotes = notes.filter(function(n) { return n.isOpen; }).sort(function(a, b) { return b.zIndex - a.zIndex; });
                        if (openNotes.length > 0) {
                            if (document.activeElement.tagName !== 'BODY') {
                                document.activeElement.blur();
                            } else {
                                toggleWindowStatus(openNotes[0].id, false);
                            }
                        }
                    }
                });
            }

            return {
                init: init,
                createNote: createNote,
                updateNote: updateNote,
                deleteNote: deleteNote,
                toggleWindowStatus: toggleWindowStatus,
                toggleFullScreen: toggleFullScreen,
                logout: logout,
                loadNotes: loadNotes
            };
        })();

        document.addEventListener('DOMContentLoaded', stix.init);
    </script>
</body>
